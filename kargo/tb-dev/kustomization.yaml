apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Kargo freight-verification resources for tb-dev. Applied to the Kargo Project
# namespace (NOT the `accounts` app namespace, and NOT part of the ArgoCD app-of-apps
# that syncs overlays/). Set the namespace once the Kargo Project exists.
namespace: REPLACE_KARGO_PROJECT_NS
resources:
  - analysistemplate-accounts-signin.yaml
  - externalsecret-e2e-creds.yaml
