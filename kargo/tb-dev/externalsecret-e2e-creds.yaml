# Test-user credentials for the Accounts sign-in freight-verification E2E.
#
# Syncs the tb-dev Accounts E2E test user (an existing Thundermail/Accounts user with
# @stage-thundermail.com login) from AWS Secrets Manager into the `accounts-e2e-creds`
# Secret, which the AnalysisTemplate mounts as ACCTS_OIDC_EMAIL / ACCTS_OIDC_PWORD.
#
# Must live in the SAME namespace as the AnalysisRun Job (the Kargo Project namespace),
# and that cluster needs the `aws-secrets-manager` ClusterSecretStore + an IRSA role
# allowed to read `mzla/tb-dev/accounts-e2e`. Create the Secrets Manager secret with
# those two JSON keys; do NOT commit the values.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: accounts-e2e-creds
  namespace: tb-accounts
  labels:
    app.kubernetes.io/part-of: thunderbird-accounts
    kargo.akuity.io/env: tb-dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: accounts-e2e-creds
    creationPolicy: Owner
  data:
    - secretKey: ACCTS_OIDC_EMAIL
      remoteRef:
        key: mzla/tb-dev/accounts-e2e
        property: ACCTS_OIDC_EMAIL
    - secretKey: ACCTS_OIDC_PWORD
      remoteRef:
        key: mzla/tb-dev/accounts-e2e
        property: ACCTS_OIDC_PWORD
