# Tailnet-only Ingress for the tb-dev Accounts web app. Dev is private to the
# tailnet for validation -- no public Cloudflare tunnel yet. Public exposure
# (accounts.tb.pro via Cloudflare tunnel) lands at the prod cutover (#147).
#
# Operator appends .<TAILNET>.ts.net -> accounts-tb-dev.tail2726a2.ts.net
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: accounts-tb-dev
  namespace: accounts
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  ingressClassName: tailscale
  tls:
    - hosts:
        - accounts-tb-dev
  defaultBackend:
    service:
      name: accounts
      port:
        number: 80
