# Assigns a dedicated pod security group to the Accounts web + celery pods so they
# can reach the Accounts RDS Postgres, ElastiCache Redis, and the Stalwart
# management API. Under POD_SECURITY_GROUP_ENFORCING_MODE=strict the listed SGs
# REPLACE the node SG, so the EKS control-plane cluster SG must also be listed:
#   - sg-07624df6ceb8865ec : tb-dev EKS control-plane cluster SG (pod<->control-plane)
#   - sg-0dba8adea7684454f : mzla-tb-dev-accounts-pod, from the
#       mzla-tb-dev pulumi output (thunderbird/platform-infrastructure#596)
apiVersion: vpcresources.k8s.aws/v1beta1
kind: SecurityGroupPolicy
metadata:
  name: accounts
  namespace: accounts
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: accounts
  securityGroups:
    groupIds:
      - sg-07624df6ceb8865ec
      - sg-0dba8adea7684454f
