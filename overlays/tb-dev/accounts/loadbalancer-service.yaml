# STAGED, UNREFERENCED (thunderbird.dev public endpoint, platform-infrastructure#613)
# — intentionally NOT listed in overlays/tb-dev/kustomization.yaml yet, so nothing
# changes at sync and the working tailnet-only dev setup + OIDC stay untouched.
#
# This is the public AWS NLB front door for the customer-facing Accounts web app on
# the NEW tb-dev cluster (mzla-eks-tb-dev01), as an ADDITIONAL, parallel endpoint to
# the legacy accounts.tb.pro (legacy is NOT touched / NOT migrated here).
#
# Mode A TLS (mirrors the Customer Auth Keycloak NLB approach):
#   - aws-load-balancer-type: external  -> AWS Load Balancer Controller provisions an
#     NLB (not the legacy in-tree controller).
#   - nlb-target-type: ip               -> targets pod IPs directly (VPC-CNI), no
#     NodePort hop.
#   - scheme: internet-facing           -> public NLB.
#   - ssl-cert + ssl-ports "443"        -> the NLB terminates TLS on :443 with the
#     per-env wildcard ACM cert (*.tb-dev.thunderbird.dev) and forwards plain HTTP to
#     the pod :8087; accounts/Keycloak keep their proxy-header (xforwarded) handling.
#   - external-dns hostname             -> same-account external-dns (AWS provider,
#     IRSA) writes the A/ALIAS record in the delegated tb-dev.thunderbird.dev Route53
#     sub-zone (NOT Cloudflare).
#
# Public apps on this cluster: accounts (here) + auth/keycloak. Staff surfaces
# (Django /admin*, /mail/admin*, Flower) STAY tailnet-only — do NOT expose here.
#
# Placeholders (fill before referencing):
#   REPLACE_TB_DEV_WILDCARD_ACM_ARN — regional ACM cert ARN for *.tb-dev.thunderbird.dev
#     (eu-central-1), created once the delegated sub-zone exists (platform-infrastructure#613).
#
# Flipping this public requires: the wildcard ACM cert issued + validated, the
# delegated sub-zone live, AND a coordinated OIDC redirect-URI update (accounts OIDC
# config + the Keycloak thunderbird-accounts client) — gated, staged only.
apiVersion: v1
kind: Service
metadata:
  name: accounts-public
  namespace: accounts
  labels:
    app.kubernetes.io/name: accounts
    app.kubernetes.io/component: web
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: external
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: REPLACE_TB_DEV_WILDCARD_ACM_ARN
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
    external-dns.alpha.kubernetes.io/hostname: accounts.tb-dev.thunderbird.dev
spec:
  type: LoadBalancer
  loadBalancerClass: service.k8s.aws/nlb
  selector:
    app.kubernetes.io/name: accounts
    app.kubernetes.io/component: web
  ports:
    # Public TLS :443 -> pod http (:8087). The NLB terminates TLS (ssl-cert +
    # ssl-ports above); the listener target is plain HTTP on the pod.
    - name: https
      port: 443
      targetPort: http
      protocol: TCP
