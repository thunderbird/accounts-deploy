# tb-dev environment-specific, non-secret config. Layered over the base
# accounts-config ConfigMap. Hosts/URLs marked REPLACE_* are finalized as the
# data stores (#597) and OIDC wiring (#599) land.
apiVersion: v1
kind: ConfigMap
metadata:
  name: accounts-config
  namespace: accounts
data:
  # 'mzla-tb-dev' (any non-'dev' value): the app reads APP_ENV=dev as LOCAL dev
  # (http, no proxy) and disables SECURE_PROXY_SSL_HEADER, so Django would ignore the
  # tailscale ingress's X-Forwarded-Proto and emit http:// OIDC redirect_uris. The
  # secure-proxy header is gated on `not IS_DEV`, so any non-'dev' value keeps https://.
  # Using a per-env value (not 'stage') also names the Sentry environment and the
  # PostHog env tag (both = APP_ENV), keeping EKS-dev telemetry out of the real `stage`
  # streams. Verified safe: nothing branches on APP_ENV/IS_STAGE/IS_PROD. See
  # accounts-deploy docs §12.4 and platform-infrastructure#617.
  APP_ENV: "mzla-tb-dev"
  # Paddle environment (non-secret). tb-dev uses the sandbox, matching the accounts
  # STAGE setup; the PADDLE_TOKEN/API_KEY/WEBHOOK_KEY/PRICE_ID_* secrets come from the
  # ESO bundle (mzla/tb-dev/accounts, extracted from the stage Paddle creds).
  PADDLE_ENV: "sandbox"
  # Public customer host (internet-facing ALB, thunderbird.dev TEST domain).
  PUBLIC_BASE_URL: "https://accounts.tb-dev.thunderbird.dev"
  # Must match the tbpro Keycloak user domain (tb-dev is a stage clone: users are
  # @stage-thundermail.com). First entry = PRIMARY_EMAIL_DOMAIN, which the admin
  # Thundermail-address form requires. Matches stage's value.
  ALLOWED_EMAIL_DOMAINS: "stage-thundermail.com"
  # Dev: accept any Host so the ALB target-group health check (Host = pod IP) and
  # both ingresses pass. prod must pin this to the real host.
  ALLOWED_HOSTS: "*"
  # BOTH origins: the env var REPLACES (not appends), and the tailnet admin/staff
  # POSTs still need their origin trusted alongside the public customer origin.
  CSRF_TRUSTED_ORIGINS: "https://accounts.tb-dev.thunderbird.dev,https://accounts-tb-dev.tail2726a2.ts.net"

  # Accounts Postgres (net-new ACK RDS, #597). DATABASE_HOST/PORT come from the
  # accounts-db-endpoint ConfigMap (ACK FieldExport), not from here.
  DATABASE_NAME: "accounts"
  DATABASE_USER: "accounts"

  # OIDC against the tbpro realm on the dev Customer Auth Keycloak (#599).
  # Front-channel (browser redirects) uses the PUBLIC auth host, which is also the
  # ID token issuer (keycloak KC_HOSTNAME = https://auth.tb-dev.thunderbird.dev).
  # Back-channel (server-to-server token/userinfo/jwks + admin API) stays on the
  # in-cluster Service (transport only; tokens carry iss = the public host, so it
  # stays consistent with the front-channel host).
  OIDC_URL_AUTH: "https://auth.tb-dev.thunderbird.dev/realms/tbpro/protocol/openid-connect/auth/"
  OIDC_URL_LOGOUT: "https://auth.tb-dev.thunderbird.dev/realms/tbpro/protocol/openid-connect/logout/"
  OIDC_URL_TOKEN: "http://keycloak-customer.keycloak-customer.svc.cluster.local/realms/tbpro/protocol/openid-connect/token/"
  OIDC_URL_USER: "http://keycloak-customer.keycloak-customer.svc.cluster.local/realms/tbpro/protocol/openid-connect/userinfo/"
  OIDC_URL_JWKS: "http://keycloak-customer.keycloak-customer.svc.cluster.local/realms/tbpro/protocol/openid-connect/certs/"

  # Keycloak admin API (in-cluster) for the user-reconcile / MFA flows + /health.
  # KEYCLOAK_URL_REALM is derived by the app from KEYCLOAK_URL_API.
  KEYCLOAK_URL_API: "http://keycloak-customer.keycloak-customer.svc.cluster.local/admin/realms/tbpro"
  # The admin client (KEYCLOAK_ADMIN_CLIENT_ID=tb-accounts-admin) is a service
  # account in the MASTER realm (as on stage), so the client_credentials token
  # grant must hit /realms/master (not tbpro) -- otherwise admin auth fails and
  # user/mail provisioning + /health break. It still manages tbpro via
  # KEYCLOAK_URL_API above.
  KEYCLOAK_ADMIN_URL_TOKEN: "http://keycloak-customer.keycloak-customer.svc.cluster.local/realms/master/protocol/openid-connect/token/"

  # Stalwart management API (reached over VPC peering) -- finalized in #597.
  STALWART_BASE_API_URL: "REPLACE_TB_DEV_STALWART_API_URL"
