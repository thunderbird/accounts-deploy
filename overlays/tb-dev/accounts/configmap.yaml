# tb-dev environment-specific, non-secret config. Layered over the base
# accounts-config ConfigMap. Hosts/URLs marked REPLACE_* are finalized as the
# data stores (#597) and OIDC wiring (#599) land.
apiVersion: v1
kind: ConfigMap
metadata:
  name: accounts-config
  namespace: accounts
data:
  # 'mzla-tb-dev' (any non-'dev' value): the app reads APP_ENV=dev as LOCAL dev
  # (http, no proxy) and disables SECURE_PROXY_SSL_HEADER, so Django would ignore the
  # tailscale ingress's X-Forwarded-Proto and emit http:// OIDC redirect_uris. The
  # secure-proxy header is gated on `not IS_DEV`, so any non-'dev' value keeps https://.
  # Using a per-env value (not 'stage') also names the Sentry environment and the
  # PostHog env tag (both = APP_ENV), keeping EKS-dev telemetry out of the real `stage`
  # streams. Verified safe: nothing branches on APP_ENV/IS_STAGE/IS_PROD. See
  # accounts-deploy docs §12.4 and platform-infrastructure#617.
  APP_ENV: "mzla-tb-dev"
  PUBLIC_BASE_URL: "https://accounts-tb-dev.tail2726a2.ts.net"
  ALLOWED_EMAIL_DOMAINS: "thundermail.com,tb.pro"
  # tailnet-only dev validation: accept any Host so the kubelet probe (Host = pod
  # IP) and the tailnet ingress both pass. prod must pin this to the real host.
  ALLOWED_HOSTS: "*"
  CSRF_TRUSTED_ORIGINS: "https://accounts-tb-dev.tail2726a2.ts.net"

  # Accounts Postgres (net-new ACK RDS, #597). DATABASE_HOST/PORT come from the
  # accounts-db-endpoint ConfigMap (ACK FieldExport), not from here.
  DATABASE_NAME: "accounts"
  DATABASE_USER: "accounts"

  # OIDC against the tbpro realm on the dev Customer Auth Keycloak (#599).
  # Front-channel (browser redirects) uses the tailnet hostname; back-channel
  # (server-to-server token/userinfo/jwks + admin API) uses the in-cluster
  # Service, since the pod can't resolve/reach the tailnet MagicDNS name. The
  # ID token issuer is the tailnet hostname (KC_HOSTNAME) either way.
  OIDC_URL_AUTH: "https://keycloak-customer-tb-dev.tail2726a2.ts.net/realms/tbpro/protocol/openid-connect/auth/"
  OIDC_URL_LOGOUT: "https://keycloak-customer-tb-dev.tail2726a2.ts.net/realms/tbpro/protocol/openid-connect/logout/"
  OIDC_URL_TOKEN: "http://keycloak-customer.keycloak-customer.svc.cluster.local/realms/tbpro/protocol/openid-connect/token/"
  OIDC_URL_USER: "http://keycloak-customer.keycloak-customer.svc.cluster.local/realms/tbpro/protocol/openid-connect/userinfo/"
  OIDC_URL_JWKS: "http://keycloak-customer.keycloak-customer.svc.cluster.local/realms/tbpro/protocol/openid-connect/certs/"

  # Keycloak admin API (in-cluster) for the user-reconcile / MFA flows + /health.
  # KEYCLOAK_URL_REALM is derived by the app from KEYCLOAK_URL_API.
  KEYCLOAK_URL_API: "http://keycloak-customer.keycloak-customer.svc.cluster.local/admin/realms/tbpro"
  KEYCLOAK_ADMIN_URL_TOKEN: "http://keycloak-customer.keycloak-customer.svc.cluster.local/realms/tbpro/protocol/openid-connect/token/"

  # Stalwart management API (reached over VPC peering) -- finalized in #597.
  STALWART_BASE_API_URL: "REPLACE_TB_DEV_STALWART_API_URL"
