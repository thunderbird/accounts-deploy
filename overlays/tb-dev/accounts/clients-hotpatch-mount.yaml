# tb-dev HOTPATCH: mount a v0.16-ported thunderbird_accounts/mail/clients.py over
# the image's copy, so the app can talk to Stalwart v0.16.13 (which removed the REST
# management API the shipped client targets). Delivered as a ConfigMap file-mount
# (subPath) rather than an app-repo change; the proper clients.py PR lands upstream
# later. configMapGenerator hashes the CM name, so each edit rolls the pods; the
# Reloader annotation also covers it. Mounted on all three deployments that load
# MailClient (web serves /health; celery runs provisioning tasks).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: accounts-web
  namespace: accounts
spec:
  template:
    spec:
      volumes:
        - name: clients-hotpatch
          configMap:
            name: accounts-clients-hotpatch
      containers:
        - name: accounts
          volumeMounts:
            - name: clients-hotpatch
              mountPath: /app/src/thunderbird_accounts/mail/clients.py
              subPath: clients.py
              readOnly: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: accounts-celery
  namespace: accounts
spec:
  template:
    spec:
      volumes:
        - name: clients-hotpatch
          configMap:
            name: accounts-clients-hotpatch
      containers:
        - name: accounts-celery
          volumeMounts:
            - name: clients-hotpatch
              mountPath: /app/src/thunderbird_accounts/mail/clients.py
              subPath: clients.py
              readOnly: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: accounts-flower
  namespace: accounts
spec:
  template:
    spec:
      volumes:
        - name: clients-hotpatch
          configMap:
            name: accounts-clients-hotpatch
      containers:
        - name: accounts-flower
          volumeMounts:
            - name: clients-hotpatch
              mountPath: /app/src/thunderbird_accounts/mail/clients.py
              subPath: clients.py
              readOnly: true
