---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: accounts

resources:
  - ../../bases
  - accounts/tailscale-ingress.yaml
  - accounts/securitygrouppolicy.yaml

images:
  # Set to the multi-arch accounts image (arm64) once it is available to the
  # tb-dev cluster (per-account ECR mirror or cross-account pull) -- see
  # thunderbird/platform-infrastructure#593.
  - name: REPLACE_ACCOUNTS_ECR/accounts
    newName: REPLACE_TB_DEV_ACCOUNTS_ECR/accounts
    newTag: REPLACE_IMAGE_TAG

patches:
  # Env-specific, non-secret config (hosts, URLs, public base URL).
  - path: accounts/configmap.yaml
  # dev runs a single web replica (migrations run on web boot; avoid concurrency).
  - path: accounts/web-deployment.yaml
  # ExternalSecret remoteRef key -> mzla/tb-dev/*
  - target:
      group: external-secrets.io
      version: v1
      kind: ExternalSecret
      name: accounts-secrets
    patch: |-
      - op: replace
        path: /spec/dataFrom/0/extract/key
        value: mzla/tb-dev/accounts
