apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: accounts
resources:
- ../../bases
# Public internet-facing ALB Ingress for the customer web app
# (accounts.tb-dev.thunderbird.dev, thunderbird.dev TEST domain). /admin +
# /mail/admin are denied 403 at the edge; Flower + admin stay tailnet-only.
- accounts/public-ingress.yaml
- accounts/tailscale-ingress.yaml
- accounts/flower-ingress.yaml
- accounts/securitygrouppolicy.yaml
images:
- name: REPLACE_ACCOUNTS_ECR/accounts
  newName: ghcr.io/thunderbird/thunderbird-accounts
  digest: sha256:6bae681ffad1285475b27d9c82ae2d3e0ab29d6685b690619678aae72659c57f
# tb-dev HOTPATCH: generate a ConfigMap from the v0.16-ported clients.py. The
# hashed name means each edit changes the CM name -> rolls the pods (Reloader also
# covers it). Mounted via subPath in accounts/clients-hotpatch-mount.yaml.
configMapGenerator:
- name: accounts-clients-hotpatch
  files:
  - clients.py=hotpatch/clients.py
patches:
# Env-specific, non-secret config (hosts, URLs, public base URL).
- path: accounts/configmap.yaml
# dev runs a single web replica (migrations run on web boot; avoid concurrency).
- path: accounts/web-deployment.yaml
# tb-dev HOTPATCH: mount the v0.16-ported clients.py over the image copy on all
# three deployments (see accounts/clients-hotpatch-mount.yaml).
- path: accounts/clients-hotpatch-mount.yaml
# ExternalSecret remoteRef key -> mzla/tb-dev/*
- target:
    group: external-secrets.io
    version: v1
    kind: ExternalSecret
    name: accounts-secrets
  patch: |-
    - op: replace
      path: /spec/dataFrom/0/extract/key
      value: mzla/tb-dev/accounts
# accounts-db master-password ExternalSecret -> mzla/tb-dev/*
- target:
    group: external-secrets.io
    version: v1
    kind: ExternalSecret
    name: accounts-db
  patch: |-
    - op: replace
      path: /spec/data/0/remoteRef/key
      value: mzla/tb-dev/accounts-db
    - op: replace
      path: /spec/data/1/remoteRef/key
      value: mzla/tb-dev/accounts-db
# ---- ACK data stores (net-new RDS + Redis), #597 ----
# VPC + pod SG (sg-0dba8adea7684454f from pulumi #596) on the SGs.
- target:
    group: ec2.services.k8s.aws
    version: v1alpha1
    kind: SecurityGroup
    name: accounts-rds
  patch: |-
    - op: replace
      path: /spec/vpcID
      value: vpc-0e0f4b8d603d463e0
    - op: replace
      path: /spec/ingressRules/0/userIDGroupPairs/0/groupID
      value: sg-0dba8adea7684454f
- target:
    group: ec2.services.k8s.aws
    version: v1alpha1
    kind: SecurityGroup
    name: accounts-redis
  patch: |-
    - op: replace
      path: /spec/vpcID
      value: vpc-0e0f4b8d603d463e0
    - op: replace
      path: /spec/ingressRules/0/userIDGroupPairs/0/groupID
      value: sg-0dba8adea7684454f
# private subnets (same as the tb-dev Stalwart subnet groups)
- target:
    group: rds.services.k8s.aws
    version: v1alpha1
    kind: DBSubnetGroup
    name: accounts-db-subnets
  patch: |-
    - op: replace
      path: /spec/subnetIDs
      value:
        - subnet-044e18f3022fb9ee1
        - subnet-01084662e5e16dce9
- target:
    group: elasticache.services.k8s.aws
    version: v1alpha1
    kind: CacheSubnetGroup
    name: accounts-redis-subnets
  patch: |-
    - op: replace
      path: /spec/subnetIDs
      value:
        - subnet-044e18f3022fb9ee1
        - subnet-01084662e5e16dce9
# DBInstance identifier + RDS SG id (REPLACE_*_RDS_SG filled after the ACK SG
# is first created and its id is known).
- target:
    group: rds.services.k8s.aws
    version: v1alpha1
    kind: DBInstance
    name: accounts-db
  patch: |-
    - op: replace
      path: /spec/dbInstanceIdentifier
      value: mzla-tb-dev-accounts
    - op: replace
      path: /spec/dbInstanceClass
      value: db.t4g.micro
    - op: replace
      path: /spec/vpcSecurityGroupIDs/0
      value: sg-0236e5fa6a3ec2d14
- target:
    group: elasticache.services.k8s.aws
    version: v1alpha1
    kind: ReplicationGroup
    name: accounts-redis
  patch: |-
    - op: replace
      path: /spec/securityGroupIDs/0
      value: sg-0be1a8015ac9b2535
# ---- tb-dev DB cutover: ACK RDS -> Neon branch (connection string) ----
# Disable the RDS DATABASE_HOST FieldExport so it no longer overwrites the endpoint
# ConfigMap with the RDS address, then set DATABASE_HOST statically to the Neon tb-dev
# branch endpoint (pooler; the app is Neon-pooler-safe -- DISABLE_SERVER_SIDE_CURSORS).
# Reached via a plain public connection string over TLS (accounts pods are egress-all,
# NAT out), no PrivateLink. The ACK RDS resources are left in place for now (removed in
# a follow-up once Neon is verified). Password (neondb_owner) is in mzla/tb-dev/accounts-db.
- target:
    group: services.k8s.aws
    version: v1alpha1
    kind: FieldExport
    name: accounts-db-host
  patch: |-
    $patch: delete
    apiVersion: services.k8s.aws/v1alpha1
    kind: FieldExport
    metadata:
      name: accounts-db-host
      namespace: accounts
- target:
    version: v1
    kind: ConfigMap
    name: accounts-db-endpoint
  patch: |-
    - op: add
      path: /data/DATABASE_HOST
      value: ep-muddy-sky-a2tslt0c-pooler.eu-central-1.aws.neon.tech
