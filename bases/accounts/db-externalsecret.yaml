# Master credentials for the net-new Accounts RDS, synced from AWS Secrets Manager
# into the `accounts-db` Secret. The ACK DBInstance reads `password` as its
# masterUserPassword; the app reads it as DATABASE_PASSWORD. Create the Secrets
# Manager secret first with a generated password, e.g.:
#   aws secretsmanager create-secret --name mzla/tb-dev/accounts-db \
#     --secret-string '{"username":"accounts","password":"GENERATE"}' --region eu-central-1
# remoteRef.key is patched per overlay (mzla/tb-dev/* or mzla/tb-prod/*).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: accounts-db
  namespace: accounts
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: accounts-db
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: mzla/OVERLAY-MUST-PATCH/accounts-db
        property: username
    - secretKey: password
      remoteRef:
        key: mzla/OVERLAY-MUST-PATCH/accounts-db
        property: password
