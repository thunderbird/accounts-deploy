# Syncs the Accounts secret bundle from AWS Secrets Manager into the
# `accounts-secrets` Secret, which both Deployments load via `envFrom: secretRef`.
#
# `dataFrom.extract` pulls EVERY key from one JSON Secrets Manager secret and maps
# each JSON property to a key in the K8s Secret (i.e. an env var). The expected
# JSON keys are the secret env vars the app reads, e.g.:
#   SECRET_KEY, LOGIN_CODE_SECRET, DATABASE_PASSWORD, REDIS_URL,
#   OIDC_CLIENT_SECRET, KEYCLOAK_ADMIN_CLIENT_ID, KEYCLOAK_ADMIN_CLIENT_SECRET,
#   STALWART_API_AUTH_STRING, PADDLE_API_KEY, PADDLE_WEBHOOK_KEY, PADDLE_TOKEN,
#   ZENDESK_API_TOKEN, SENTRY_DSN, HOSTED_DKIM_CLOUDFLARE_API_TOKEN, ...
# The exact key set + the Secrets Manager secret itself are finalized under
# thunderbird/platform-infrastructure#598. remoteRef.key is patched per overlay
# to the env path (mzla/tb-dev/* or mzla/tb-prod/*).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: accounts-secrets
  namespace: accounts
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: accounts-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: mzla/OVERLAY-MUST-PATCH/accounts
