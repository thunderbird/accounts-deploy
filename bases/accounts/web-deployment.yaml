# Accounts web (Django/ASGI via Uvicorn, :8087).
#
# IMAGE: the thunderbird-accounts image, built multi-arch (amd64 for ECS today,
# arm64 for these EKS/Graviton clusters) -- see
# thunderbird/platform-infrastructure#593. The `images:` transform in each overlay
# sets newName + newTag; the string before ":" here is the match key.
#
# ENTRYPOINT: the default scripts/entry.sh path runs `manage.py migrate` +
# Paddle product/price sync and then starts Uvicorn. Migrations therefore run on
# web pod startup (as on ECS today); dev runs a single web replica to avoid
# concurrent migrate. A dedicated pre-sync migration Job is a planned follow-up
# (tracked under the Accounts-on-EKS epic, thunderbird/platform-infrastructure#144).
#
# HEALTH: GET /health deep-checks the Keycloak admin API + dependencies, so it is
# used as the READINESS gate only; liveness/startup use a lightweight TCP check so
# a transient dependency blip doesn't kill the pod.
#
# SCHEDULING: the general arm64 node group. The image must be arm64 (multi-arch).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: accounts-web
  namespace: accounts
  annotations:
    # Reloader: auto-restart this Deployment when a referenced ConfigMap/Secret
    # changes (accounts-config, accounts-secrets, and the FieldExport endpoint
    # ConfigMaps accounts-db-endpoint/accounts-redis-endpoint) -- envFrom does not
    # hot-reload. No-op until the Reloader controller is installed
    # (platform-infrastructure#784).
    reloader.stakater.com/auto: "true"
  labels:
    app.kubernetes.io/name: accounts
    app.kubernetes.io/component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: accounts
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: accounts
        app.kubernetes.io/component: web
    spec:
      securityContext:
        # The thunderbird-accounts image currently runs as root (no USER in its
        # Dockerfile), so runAsNonRoot is not enforced. Making the image run
        # non-root is a follow-up (a thunderbird-accounts change).
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        role: general
        kubernetes.io/arch: arm64
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: accounts
              app.kubernetes.io/component: web
      containers:
        - name: accounts
          image: REPLACE_ACCOUNTS_ECR/accounts:REPLACE_IMAGE_TAG
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8087
              protocol: TCP
          env:
            # Net-new RDS master password (also the app DB password) from the
            # accounts-db ExternalSecret; explicit env wins over the bundle.
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: accounts-db
                  key: password
          envFrom:
            - configMapRef:
                name: accounts-config
            - secretRef:
                name: accounts-secrets
            # DATABASE_HOST / DATABASE_PORT, populated by the ACK FieldExport
            # once the RDS instance is available.
            - configMapRef:
                name: accounts-db-endpoint
          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
