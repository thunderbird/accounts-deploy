# ClusterIP service for Flower (Celery monitoring UI). Target of the per-overlay
# staff-only Tailscale ingress — never behind the customer LB (docs §12.3).
apiVersion: v1
kind: Service
metadata:
  name: accounts-flower
  namespace: accounts
  labels:
    app.kubernetes.io/name: accounts
    app.kubernetes.io/component: flower
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: accounts
    app.kubernetes.io/component: flower
  ports:
    - name: flower
      port: 5555
      targetPort: flower
      protocol: TCP
