# ClusterIP service for the Accounts web app (tunnel / tailscale ingress target).
apiVersion: v1
kind: Service
metadata:
  name: accounts
  namespace: accounts
  labels:
    app.kubernetes.io/name: accounts
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: accounts
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
